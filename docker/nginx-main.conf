worker_processes auto;

pid /home/container/nginx/nginx.pid;
error_log /home/container/nginx/logs/error.log warn;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /home/container/nginx/logs/access.log main;
    error_log  /home/container/nginx/logs/error.log warn;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    client_body_temp_path /home/container/nginx/tmp/client_body;
    proxy_temp_path       /home/container/nginx/tmp/proxy;
    fastcgi_temp_path     /home/container/nginx/tmp/fastcgi;
    scgi_temp_path        /home/container/nginx/tmp/scgi;
    uwsgi_temp_path       /home/container/nginx/tmp/uwsgi;

    # =========================
    # Server configuration
    # =========================
    server {
        listen 8008;
        client_max_body_size 100M;

        root /home/container/app/packages/web/dist;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        location /ws {
            proxy_pass http://127.0.0.1:3003;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            client_max_body_size 100M;
        }
    }

    include /etc/nginx/http.d/*.conf;
}
